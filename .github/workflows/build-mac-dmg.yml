name: Build macOS DMG (Intel & Apple Silicon)

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install macOS Dependencies
      run: |
        brew install p7zip
        brew install create-dmg

    - name: Publish for Intel Mac (osx-x64)
      run: |
        # 修复了这里的 csproj 路径
        dotnet publish v2rayN/v2rayN.Desktop/v2rayN.Desktop.csproj -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -o ./publish_osx_x64
        chmod +x package-osx.sh
        ./package-osx.sh macos-x64 ./publish_osx_x64 1.0.0

    - name: Publish for M-Chip Mac (osx-arm64)
      run: |
        # 修复了这里的 csproj 路径
        dotnet publish v2rayN/v2rayN.Desktop/v2rayN.Desktop.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -o ./publish_osx_arm64
        chmod +x package-osx.sh
        ./package-osx.sh macos-arm64 ./publish_osx_arm64 1.0.0

    - name: Upload DMG Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: v2rayN-macOS-DMGs
        path: |
          *.dmg
